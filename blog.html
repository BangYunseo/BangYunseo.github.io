<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블로그 - BangYunseo</title>
  <meta name="description" content="방윤서의 개발 블로그. 공부 기록, 프로젝트 회고, 기술 글을 공유합니다.">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- 네비게이션 플레이스홀더 -->
  <div id="nav-placeholder"></div>

  <!-- 블로그 섹션 -->
  <section
    style="padding-top: calc(var(--nav-height) + 3rem); max-width: 1100px; margin: 0 auto; padding-bottom: 5rem;">
    <div class="section-header fade-in">
      <h2>블로그</h2>
      <p>공부 기록, 프로젝트 회고, 개발 관련 글들을 정리합니다.</p>
    </div>

    <!-- 포스트 카드 그리드 (posts.js에서 동적 렌더링) -->
    <div class="blog-grid" id="blog-grid">
      <!-- posts.js가 카드를 여기에 삽입합니다 -->
    </div>
  </section>

  <!-- 푸터 플레이스홀더 -->
  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/posts-data.js"></script>
  <script src="js/posts.js"></script>

  <!-- 여기서 직접 posts.js의 데이터를 읽어 즉시 동적 렌더링을 진행합니다 -->
  <script>
    function renderBlogCards() {
      const grid = document.getElementById('blog-grid');
      if (!grid) return;

      if (!posts || posts.length === 0) {
        grid.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:3rem 0;">아직 작성된 글이 없습니다.</p>';
        return;
      }

      // 최신순 정렬
      const sorted = [...posts].sort((a, b) => new Date(b.date) - new Date(a.date));

      sorted.forEach((post) => {
        const card = document.createElement('a');
        card.href = 'post.html?id=' + post.id;
        // 동적 렌더링 요소는 main.js의 옵저버 타이밍과 어긋나 영원히 투명해질 수 있으므로 즉시 visible 부여
        card.className = 'blog-card fade-in visible';

        let displayTitle = post.title || '제목 없음';
        const match = displayTitle.match(/^(\[\d+\])\s*(.*)/);
        if (match) {
          displayTitle = `<span style="color: var(--accent); font-family: var(--font-mono); font-size: 0.85em; margin-right: 0.5rem; background: rgba(88, 166, 255, 0.1); padding: 0.2rem 0.4rem; border-radius: 4px; vertical-align: middle;">${match[1]}</span><span style="vertical-align: middle;">${match[2]}</span>`;
        }

        const tagsHtml = (post.tags && Array.isArray(post.tags))
          ? post.tags.map((t) => `<span class="blog-tag">#${t}</span>`).join('')
          : '';

        const thumbHtml = post.thumb
          ? `<img src="${post.thumb}" alt="${post.title} 썸네일">`
          : `<span class="blog-card-thumb-icon" style="font-size: 3rem; opacity: 0.6;">📄</span>`;

        card.innerHTML = `
          <div class="blog-card-content" style="flex: 1; padding: 1.75rem; display: flex; flex-direction: column;">
            <div class="blog-card-meta" style="color: var(--text-muted); margin-bottom: 0.9rem; font-size: 0.78rem;">
              <span class="blog-card-category" style="background: rgba(163, 113, 247, 0.15); color: var(--accent-purple); padding: 0.2rem 0.6rem; border-radius: 20px;">${post.category || '기타'}</span>
              <span style="margin-left: 0.5rem;">${new Date(post.date).toLocaleString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</span>
            </div>
            <h3 style="margin-bottom: 0.5rem; line-height: 1.4; display: flex; align-items: center;">${displayTitle}</h3>
            <div class="blog-card-tags" style="margin-top: auto; padding-top: 1rem; display: flex; gap: 0.4rem; flex-wrap: wrap;">
              ${tagsHtml}
            </div>
          </div>
          <div class="blog-card-thumb" style="width: 140px; background: rgba(88, 166, 255, 0.05); display: flex; align-items: center; justify-content: center;">
            ${thumbHtml}
          </div>
        `;

        grid.appendChild(card);
      });
    }

    // 문서가 준비되면 블로그 리스트 렌더링 함수 실행
    document.addEventListener('DOMContentLoaded', renderBlogCards);
  </script>
</body>

</html>
