<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블로그 - BangYunseo</title>
  <meta name="description" content="방윤서의 개발 블로그. 공부 기록, 프로젝트 회고, 기술 글을 공유합니다.">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- 네비게이션 플레이스홀더 -->
  <div id="nav-placeholder"></div>

  <!-- 블로그 섹션 -->
  <section style="padding-top: calc(var(--nav-height) + 3rem); max-width: 1100px; margin: 0 auto; padding-bottom: 5rem;">
    <div class="section-header fade-in">
      <h2>블로그 <span>📝</span></h2>
      <p>공부 기록, 프로젝트 회고, 개발 관련 글들을 정리합니다.</p>
    </div>

    <!-- 포스트 카드 그리드 (posts.js에서 동적 렌더링) -->
    <div class="blog-grid" id="blog-grid">
      <!-- posts.js가 카드를 여기에 삽입합니다 -->
    </div>
  </section>

  <!-- 푸터 플레이스홀더 -->
  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/posts.js"></script>
</body>

</html>
