<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블로그 상세 - BangYunseo</title>
  <meta name="description" content="방윤서 블로그 포스트">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- 네비게이션 플레이스홀더 -->
  <div id="nav-placeholder"></div>

  <article class="post-container" id="post-container">
    <!-- 뒤로 가기 -->
    <a href="blog.html" class="post-back-btn">← 블로그 목록</a>

    <!-- 포스트 헤더 -->
    <header class="post-header">
      <div class="post-meta" id="post-meta">
        <!-- JS가 카테고리와 날짜를 주입함 -->
      </div>
      <h1 id="post-title"></h1>
      <div id="post-tags" style="display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.75rem;">
        <!-- JS가 태그들을 주입함 -->
      </div>
    </header>

    <!-- 포스트 본문 -->
    <div class="post-content" id="post-content">
      <!-- JS가 Markdown 랜더링 내용을 주입함 -->
    </div>
  </article>

  <!-- 푸터 플레이스홀더 -->
  <div id="footer-placeholder"></div>

  <!-- Markdown 파서 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/posts-data.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
