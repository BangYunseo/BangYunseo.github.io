<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로젝트 - BangYunseo</title>
  <meta name="description" content="방윤서가 진행한 프로젝트들을 확인하세요.">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- 네비게이션 플레이스홀더 -->
  <div id="nav-placeholder"></div>

  <!-- 프로젝트 섹션 -->
  <section class="project-section">
    <div class="section-header fade-in">
      <h2>프로젝트</h2>
      <p>직접 진행한 프로젝트들입니다. 제목을 클릭하면 GitHub에서 자세한 내용을 확인할 수 있습니다.</p>
    </div>

    <!-- 필터 -->
    <div class="filter-buttons fade-in">
      <button class="filter-btn active" onclick="filterProjects('all', this)">전체</button>
      <button class="filter-btn" onclick="filterProjects('game', this)">게임</button>
      <button class="filter-btn" onclick="filterProjects('web', this)">웹 개발</button>
      <button class="filter-btn" onclick="filterProjects('other', this)">기타</button>
    </div>

    <!-- 프로젝트 그리드 -->
    <div class="project-grid" id="all-projects">

      <!-- 프로젝트 3 -->
      <div class="project-card fade-in" data-category="web">
        <div class="project-card-img-placeholder">🌐</div>
        <div class="project-card-content">
          <div style="margin-bottom:.75rem;"><span class="project-category category-web">Web</span></div>
          <h3>개인 프로젝트 사이트</h3>
          <p>순수 HTML/CSS/JavaScript로 제작한 이 프로젝트 사이트입니다. 다크 테마, 반응형 레이아웃, 스크롤 애니메이션, 정적 블로그 시스템을 포함합니다.</p>
          <div class="tech-stack" style="justify-content:flex-start;margin-bottom:1rem;">
            <span class="tech-tag">HTML</span>
            <span class="tech-tag">CSS</span>
            <span class="tech-tag">JavaScript</span>
          </div>
          <div class="project-card-footer">
            <a href="https://github.com/BangYunseo/BangYunseo.github.io" target="_blank" class="project-link">GitHub
              →</a>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- 푸터 플레이스홀더 -->
  <div id="footer-placeholder"></div>

  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script>
    function filterProjects(category, btn) {
      // 필터 버튼 활성화
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // 카드 표시/숨김
      document.querySelectorAll('#all-projects .project-card').forEach((card) => {
        if (category === 'all' || card.dataset.category === category) {
          card.style.display = '';
        } else {
          card.style.display = 'none';
        }
      });
    }
  </script>
</body>

</html>
